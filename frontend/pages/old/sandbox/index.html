<!DOCTYPE html>
<html>
  <head>
    <title>Hello from Electron renderer!</title>
    <link rel="stylesheet" type="text/css" href="/shared/styles.css">
  </head>

  <body>
    <div>
      <input type="text" id="tickerInput" placeholder="Enter Stock Ticker" />
      <button id="getStock">Enter</button>
      <button id="untrackStock">Untrack Stock</button>
      <button id="showAll">Show All Stocks</button>

      <div id="stockData">
        <p id="name"></p>
        <p id="ticker"></p>
        <p id="buyPrice"></p>
        <p id="sellPrice"></p>
        <button id="buyButton">Buy</button>
        <button id="sellButton">Sell</button>
        <button id="addCash">Add Cash</button>
        <button id="refresh">Refresh</button>
        <p id="balance"></p>
        <p id="totalQuantity"></p>

        <canvas id="priceChart"></canvas>
      </div>

    </div>
  </body>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/pages/sandbox/index.js"></script>
</html>
